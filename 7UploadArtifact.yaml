name: Upload Artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create file
        run: |
          mkdir output
          echo "Hello GitHub Actions" > output/demo.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: output/
