name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/myapp \
            myapp=${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/myapp



secrets.KUBE_CONFIG:
        aws eks update-kubeconfig --region us-east-1 --name my-eks-cluster

        Above cmd generates a kubeconfig file(~/.kube/config) in eks cluster, copy that content & paste it in secrets


GitHub Actions connects to AWS EKS:

GitHub Actions Runner
        │
        │ Reads ~/.kube/config
        ▼
kubectl
        │
        │ HTTPS Request
        ▼
EKS API Server
        │
        ▼
Worker Nodes
        │
        ▼
Pods

        
