name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  IMAGE_NAME: springboot-app

jobs:

  security:

    runs-on: ubuntu-latest

    steps:

      # Checkout
      - uses: actions/checkout@v4

      # Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Build
      - name: Build Application
        run: mvn clean package

      # SONARQUBE
      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \                                           //Static code Analysis shows VA's in our APP Code
            -Dsonar.projectKey=myproject \
            -Dsonar.host.url=http://YOUR_SONAR_SERVER:9000 \
            -Dsonar.login=$SONAR_TOKEN
            
      # OWASP Dependency Check
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check                  //It scans the project's third-party npm dependencies by analyzing the dependency manifests (such as package.json 
                                                                      and lock files) and comparing the package versions against known vulnerability databases (CVEs). It reports vulnerable
                                                                      packages, their severity, and recommended upgrade versions.

      # Docker Login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker Build
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Trivy Scan
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master                        //Docker images, OS packages, application dependencies, and optionally Kubernetes manifests/filesystems scans & recommends.
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # Push Image
      - name: Push Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
