name: Complete CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  IMAGE_NAME: springboot-app
  AWS_REGION: us-east-1
  EKS_CLUSTER: my-eks-cluster

jobs:
  # MATRIX BUILD & TEST
  test:

    strategy:
      fail-fast: false                   //fail-fast is a matrix strategy option that controls what happens when one of the matrix jobs fails. By deafult true if one comb fails then others will be canclled here.
                                                       In false others will run still if one comb fails

      matrix:
        os:
          - ubuntu-latest
          - windows-latest

        java:
          - 17
          - 21

        # Remove unwanted combinations
        exclude:
          - os: windows-latest
            java: 21

        # Add extra combinations
        include:
          - os: macos-latest
            java: 21

          - os: ubuntu-latest
            java: 22

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Show Environment
        run: |
          echo "OS : ${{ matrix.os }}"
          echo "Java : ${{ matrix.java }}"

      - name: Build
        run: mvn clean package

      - name: Test
        run: mvn test


  # BUILD DOCKER

  docker:

    needs: test

    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ github.sha }}

    steps:

      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}


  # DEPLOY

  deploy:

    needs: docker

    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      id-token: write
      contents: read

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Deploy Latest Image
        run: |
          kubectl set image deployment/myapp \
          myapp=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image-tag }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/myapp

      - name: Verify Pods
        run: |
          kubectl get pods
