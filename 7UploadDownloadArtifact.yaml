name: Upload Artifact
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - run: |
          mkdir output
          echo "Hello" > output/demo.txt

      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: output/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-files
          path: downloaded

      - run: ls -R downloaded
