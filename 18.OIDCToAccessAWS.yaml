S1:  IAM -> Identity Provider -> Add Provider

OpenIDConnect
URL: https://token.actions.githubusercontent.com
Audience: sts.amazonaws.com

S2: Create an IAM Role with below
Policy:
  {
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Principal": {
        "Federated": "arn:aws:iam::<ACCOUNT_ID>:oidc-provider/token.actions.githubusercontent.com"
      },
      "Action": "sts:AssumeRoleWithWebIdentity",
      "Condition": {
        "StringEquals": {
          "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
        },
        "StringLike": {
          "token.actions.githubusercontent.com:sub": "repo:YOUR_GITHUB_USERNAME/YOUR_REPOSITORY:*"
        }
      }
    }
  ]
  }


permissions:
  id-token: write
  contents: read


S4: Github Workflow
- name: Configure AWS Credentials
  uses: aws-actions/configure-aws-credentials@v4
  with:
    role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/GitHubActionsRole
    aws-region: us-east-1


S5:

GitHub
      │
Creates OIDC Token
      │
      ▼
AWS STS (If valid)
      │
Issues Temporary Credentials



S6: Testing
  - run: aws s3 ls
  - run: aws eks update-kubeconfig --region us-east-1 --name mycluster



OIDC Architeture:

1. GitHub Actions starts
        │
        ▼
2. GitHub generates an OIDC token
        │
        ▼
3. Token is sent to AWS STS
        │
        ▼
4. STS checks:
      ✓ Is the token valid?
      ✓ Is the audience sts.amazonaws.com?
      ✓ Does the repository match the IAM role trust policy?
        │
        ▼
5. STS assumes the IAM role
        │
        ▼
6. STS returns temporary AWS credentials
        │
        ▼
7. GitHub Actions uses those credentials
        │
        ▼
8. Access S3, EKS, EC2, ECR, etc.

STS (Security Token Service): It returns below things
  AccessKeyId
  SecretAccessKey
  SessionToken
  Expiration Time

aws sts get-caller-identity (It verifies who the workflow is authenticated as.)

o/p:
{
  "UserId": "AROAXXXXXXXXXXXXX",
  "Account": "123456789012",
  "Arn": "arn:aws:sts::123456789012:assumed-role/GitHubActionsRole/GitHubActions"
}
    


| Access Keys                   | OIDC                         |
| ----------------------------- | ---------------------------- |
| Long-lived credentials        | Temporary credentials        |
| Keys stored as GitHub Secrets | No AWS keys stored in GitHub |
| Manual key rotation           | No key rotation required     |
| Easier to set up              | More initial configuration   |
| Good for labs/small projects  | Recommended for production   |



How does GitHub Actions connect to AWS using OIDC?

  Configure GitHub as an OIDC identity provider in AWS IAM.
  Create an IAM role with a trust policy allowing your GitHub repository to assume it.
  Grant that role only the permissions required.
  In the workflow, grant id-token: write and use aws-actions/configure-aws-credentials.
  GitHub requests an OIDC token, AWS STS validates it, and STS returns temporary credentials.
  The workflow uses those temporary credentials to access AWS services such as S3, ECR, or EKS.


What is AWS STS?

AWS Security Token Service (STS) is a service that provides temporary security credentials to access AWS resources. It enables users, applications, or external identity providers to assume IAM roles instead of using long-lived access keys.

What is STS's role in GitHub OIDC?

GitHub Actions obtains an OIDC token and sends it to AWS STS. STS validates the token against the IAM role's trust policy. If validation succeeds, STS issues temporary AWS credentials, which the workflow uses to access AWS services. This eliminates the need to store permanent AWS access keys in GitHub Secrets.
